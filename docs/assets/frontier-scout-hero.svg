<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Frontier Scout try-before-trust workflow</title>
  <desc id="desc">A practical product screenshot-style hero showing Frontier Scout commands, verdicts, permission maps, and local evidence artifacts.</desc>
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f7fee7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace; }
      .ink { fill: #0f172a; }
      .muted { fill: #475569; }
      .soft { fill: #64748b; }
      .blue { fill: #2563eb; }
      .teal { fill: #0f766e; }
      .green { fill: #15803d; }
      .amber { fill: #b45309; }
      .red { fill: #b91c1c; }
      .white { fill: #ffffff; }
      .terminal { fill: #08111f; }
      .term-muted { fill: #94a3b8; }
      .term-green { fill: #86efac; }
      .term-blue { fill: #93c5fd; }
      .term-amber { fill: #fcd34d; }
      .stroke { stroke: #cbd5e1; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#hero-bg)"/>

  <g transform="translate(72 64)">
    <text x="0" y="0" class="sans blue" font-size="20" font-weight="800">FRONTIER SCOUT</text>
    <text x="0" y="62" class="sans ink" font-size="58" font-weight="900">Try AI tools before you trust them</text>
    <text x="2" y="105" class="sans muted" font-size="26" font-weight="500">Local evidence, sandbox probes, permission maps, adoption receipts, and CI guardrails.</text>
  </g>

  <g transform="translate(72 218)" filter="url(#shadow)">
    <rect x="0" y="0" width="850" height="432" rx="28" class="terminal"/>
    <rect x="0" y="0" width="850" height="58" rx="28" fill="#111827"/>
    <circle cx="34" cy="29" r="8" fill="#ef4444"/>
    <circle cx="62" cy="29" r="8" fill="#f59e0b"/>
    <circle cx="90" cy="29" r="8" fill="#22c55e"/>
    <text x="126" y="38" class="mono term-muted" font-size="18">local terminal</text>

    <text x="34" y="100" class="mono term-green" font-size="22">$ frontier-scout evaluate \</text>
    <text x="62" y="134" class="mono term-green" font-size="22">https://github.com/modelcontextprotocol/servers</text>
    <text x="34" y="184" class="mono term-blue" font-size="23">tool: modelcontextprotocol/servers</text>
    <text x="34" y="226" class="mono white" font-size="23">category: mcp_server</text>
    <text x="34" y="268" class="mono white" font-size="23">fit: high       risk: medium       score: 9/10</text>
    <text x="34" y="310" class="mono term-amber" font-size="23">capability.network: likely</text>
    <text x="34" y="352" class="mono term-amber" font-size="23">policy: TRIAL - sandbox evidence required</text>
    <text x="34" y="394" class="mono term-muted" font-size="23">next: trial read-only sandbox before adoption</text>
  </g>

  <g transform="translate(964 218)" filter="url(#shadow)">
    <rect x="0" y="0" width="564" height="432" rx="28" fill="#ffffff" class="stroke"/>
    <rect x="32" y="32" width="164" height="42" rx="21" fill="#fef3c7"/>
    <text x="56" y="60" class="sans amber" font-size="22" font-weight="900">TRIAL</text>
    <text x="32" y="122" class="sans ink" font-size="31" font-weight="900">Adoption receipt</text>
    <text x="32" y="164" class="mono soft" font-size="20">modelcontextprotocol/servers</text>

    <line x1="32" y1="194" x2="532" y2="194" stroke="#e2e8f0"/>

    <text x="32" y="238" class="sans muted" font-size="21">category</text>
    <text x="252" y="238" class="sans ink" font-size="22" font-weight="800">MCP server</text>
    <text x="32" y="284" class="sans muted" font-size="21">repo fit</text>
    <text x="252" y="284" class="sans green" font-size="22" font-weight="900">high</text>
    <text x="32" y="330" class="sans muted" font-size="21">dangerous flag</text>
    <text x="252" y="330" class="sans amber" font-size="22" font-weight="900">network</text>
    <text x="32" y="376" class="sans muted" font-size="21">guard result</text>
    <text x="252" y="376" class="sans red" font-size="22" font-weight="900">blocked until receipt</text>
  </g>

  <g transform="translate(72 696)">
    <rect x="0" y="0" width="1456" height="132" rx="28" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>

    <g transform="translate(34 31)">
      <rect x="0" y="0" width="300" height="70" rx="18" fill="#eff6ff"/>
      <text x="22" y="29" class="sans blue" font-size="18" font-weight="900">RADAR</text>
      <text x="22" y="55" class="sans ink" font-size="22" font-weight="800">377 scanned -> 5 verdicts</text>
    </g>

    <g transform="translate(378 31)">
      <rect x="0" y="0" width="310" height="70" rx="18" fill="#ecfdf5"/>
      <text x="22" y="29" class="sans teal" font-size="18" font-weight="900">INCIDENT DEMO</text>
      <text x="22" y="55" class="sans ink" font-size="22" font-weight="800">approval interrupted</text>
    </g>

    <g transform="translate(732 31)">
      <rect x="0" y="0" width="300" height="70" rx="18" fill="#fefce8"/>
      <text x="22" y="29" class="sans amber" font-size="18" font-weight="900">EVAL</text>
      <text x="22" y="55" class="sans ink" font-size="22" font-weight="800">cache-storm score 1.0</text>
    </g>

    <g transform="translate(1076 31)">
      <rect x="0" y="0" width="346" height="70" rx="18" fill="#f1f5f9"/>
      <text x="22" y="29" class="sans muted" font-size="18" font-weight="900">LOCAL ARTIFACTS</text>
      <text x="22" y="55" class="mono ink" font-size="16">answer.md trace.jsonl audit.jsonl</text>
    </g>
  </g>
</svg>
