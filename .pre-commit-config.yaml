# Run `pre-commit install` once after cloning to enable the hooks.
# Required: pip install pre-commit  (and optionally detect-secrets locally).
#
# GitHub Actions also runs detect-secrets. Pre-commit is the local
# fast-feedback layer; CI is the authoritative gate.

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: '\.git/|\.pytest_cache/|costs\.jsonl|quality-log\.jsonl|demo/'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        files: '\.ya?ml$'
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: end-of-file-fixer
      - id: trailing-whitespace
