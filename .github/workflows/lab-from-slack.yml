name: Lab From Slack

on:
  workflow_dispatch:
    inputs:
      TOOL:
        required: true
        description: "Tool name from the Slack verdict card"
      URL:
        required: true
        description: "Source URL from the verdict"
      USER:
        required: false
        description: "Slack user who clicked"

permissions:
  contents: write

jobs:
  lab:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      TOOL: ${{ inputs.TOOL }}
      URL: ${{ inputs.URL }}
      USER: ${{ inputs.USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/lab_from_slack.py "$TOOL" "$URL" "$USER"
      - name: Commit lab transcript
        run: |
          git config user.name "Frontier Scout"
          git config user.email "frontier-scout@users.noreply.github.com"
          git add .scratch/labs/ costs.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "lab: $TOOL"
            git push
          fi

