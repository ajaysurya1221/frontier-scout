name: Snooze From Slack

on:
  workflow_dispatch:
    inputs:
      TOOL:
        required: true
      DAYS:
        required: false
        default: "30"
      USER:
        required: false

permissions:
  contents: write

jobs:
  snooze:
    runs-on: ubuntu-latest
    env:
      TOOL: ${{ inputs.TOOL }}
      DAYS: ${{ inputs.DAYS }}
      USER: ${{ inputs.USER }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update snooze list
        run: |
          python - <<'PY'
          import datetime, json, os
          from pathlib import Path
          path = Path("snooze-list.json")
          data = json.loads(path.read_text()) if path.exists() else {}
          data[os.environ["TOOL"]] = {
              "until": (datetime.datetime.now() + datetime.timedelta(days=int(os.environ.get("DAYS", "30")))).date().isoformat(),
              "by": os.environ.get("USER", ""),
          }
          path.write_text(json.dumps(data, indent=2, sort_keys=True) + "\n")
          print("snoozed:", os.environ["TOOL"])
          PY
      - name: Commit snooze
        run: |
          git config user.name "Frontier Scout"
          git config user.email "frontier-scout@users.noreply.github.com"
          git add snooze-list.json
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "snooze $TOOL ${DAYS}d by $USER"
            git push
          fi

