name: Mark Seen From Slack

on:
  workflow_dispatch:
    inputs:
      TOOL:
        required: true
      URL:
        required: false
      USER:
        required: false
      NOTE:
        required: false

permissions:
  contents: write

jobs:
  mark-seen:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TOOL: ${{ inputs.TOOL }}
      URL: ${{ inputs.URL }}
      USER: ${{ inputs.USER }}
      NOTE: ${{ inputs.NOTE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Seed memory
        run: |
          python - <<'PY'
          import os
          from scripts.memory import mem, is_available
          tool = os.environ["TOOL"]
          url = os.environ.get("URL", "")
          user = os.environ.get("USER", "")
          text = f"{tool} manually marked seen by {user} via Slack overflow. URL: {url}"
          if not is_available():
              print("Mem0 unavailable; nothing seeded.")
          else:
              mem.add_verdict(tool=tool, verdict="assess", soc2="conditional", category="tool", text=text)
              print(f"Seeded memory: {tool}")
          PY
      - name: Commit memory
        run: |
          git config user.name "Frontier Scout"
          git config user.email "frontier-scout@users.noreply.github.com"
          git add memory/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "mark-seen $TOOL by $USER"
            git push
          fi

